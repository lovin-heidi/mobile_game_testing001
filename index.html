<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>手機小遊戲</title>
  <style>
    body { margin: 0; background: #222; }
    canvas { display: block; margin: 0 auto; background: #333; touch-action: none; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 自動適配 iPhone 尺寸
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width/2 - 20, y: canvas.height - 80, w: 40, h: 40, color: '#4caf50' };
let obstacles = [];
let speed = 4;
let score = 0;
let gameOver = false;

function spawnObstacle() {
  const w = 40 + Math.random() * 80;
  const x = Math.random() * (canvas.width - w);
  obstacles.push({ x, y: -50, w, h: 20, color: '#f44336' });
}

function collide(a, b) {
  return !(a.x + a.w < b.x || a.x > b.x + b.w || a.y + a.h < b.y || a.y > b.y + b.h);
}

function update() {
  if (gameOver) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 顯示遊戲說明
  ctx.fillStyle = '#fff';
  ctx.font = '22px sans-serif';
  ctx.fillText('閃避一切啡紅色的障礙物！', 10, 40);

  if (Math.random() < 0.02) spawnObstacle();
  obstacles.forEach(o => o.y += speed);
  obstacles = obstacles.filter(o => o.y < canvas.height + 50);

  for (const o of obstacles) {
    if (collide(player, o)) gameOver = true;
  }

  ctx.fillStyle = player.color;
  ctx.fillRect(player.x, player.y, player.w, player.h);

  obstacles.forEach(o => {
    ctx.fillStyle = o.color;
    ctx.fillRect(o.x, o.y, o.w, o.h);
  });

  score++;
  ctx.fillStyle = '#fff';
  ctx.font = '20px sans-serif';
  ctx.fillText('Score: ' + score, 10, 80);

  if (gameOver) {
    ctx.fillStyle = '#fff';
    ctx.font = '32px sans-serif';
    ctx.fillText('Game Over', canvas.width/2 - 90, canvas.height/2);
    ctx.font = '20px sans-serif';
    ctx.fillText('點擊重新開始', canvas.width/2 - 70, canvas.height/2 + 40);
  } else {
    requestAnimationFrame(update);
  }
}

canvas.addEventListener('touchstart', handleInput);
canvas.addEventListener('touchmove', handleInput);
canvas.addEventListener('click', () => { if (gameOver) restart(); });

function handleInput(e) {
  const touch = e.touches ? e.touches[0] : e;
  player.x = touch.clientX - player.w / 2;
}

function restart() {
  obstacles = [];
  score = 0;
  gameOver = false;
  player.x = canvas.width/2 - 20;
  requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
